<svg id="moldyMollyMap" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 900" role="img" aria-labelledby="mapTitle mapDesc">
  <title id="mapTitle">Moldy Molly face tracing map</title>
  <desc id="mapDesc">Eight ordered trails form Molly's ears, eyes, nose, mouth, stitches and toxic drip.</desc>
  <defs>
    <filter id="paperNoise" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.72" numOctaves="2" seed="8" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0" result="gray"/>
      <feComponentTransfer in="gray" result="faded"><feFuncA type="table" tableValues="0 0.07"/></feComponentTransfer>
      <feBlend in="SourceGraphic" in2="faded" mode="multiply"/>
    </filter>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="9" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="7" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#413822"/>
    </marker>
  </defs>

  <g filter="url(#paperNoise)">
    <path class="face-silhouette" d="M247 208 C178 165 114 199 104 273 C97 326 127 357 172 368 C124 432 112 530 139 627 C166 725 258 790 394 797 C536 804 636 746 672 642 C706 543 693 440 640 368 C688 350 712 308 699 256 C681 185 613 164 551 206 C512 165 460 143 398 143 C337 143 285 165 247 208 Z" fill="#c9b17a" opacity="0.28" stroke="#66583a" stroke-width="7"/>
    <path d="M195 350 C173 424 170 528 203 623 C241 730 318 764 399 766 C494 768 571 730 610 620 C640 535 630 424 604 349" fill="none" stroke="#766746" stroke-width="4" stroke-dasharray="8 12" opacity="0.5"/>
    <g class="mold-spots" fill="#66852d" opacity="0.35">
      <circle cx="245" cy="285" r="22"/><circle cx="210" cy="324" r="12"/><circle cx="284" cy="251" r="13"/>
      <circle cx="541" cy="302" r="18"/><circle cx="578" cy="335" r="10"/><circle cx="520" cy="257" r="9"/>
      <circle cx="286" cy="625" r="17"/><circle cx="318" cy="655" r="9"/><circle cx="536" cy="593" r="15"/>
    </g>
    <path d="M224 408 C263 363 321 371 347 417 C320 456 257 459 224 408 Z" fill="#3f3a29" opacity="0.22"/>
    <path d="M456 416 C489 370 548 371 580 414 C554 457 490 460 456 416 Z" fill="#3f3a29" opacity="0.2"/>
    <ellipse cx="404" cy="518" rx="62" ry="48" fill="#66583a" opacity="0.2"/>
    <path d="M274 608 C340 670 471 672 536 604" fill="none" stroke="#5c4c32" stroke-width="26" opacity="0.12" stroke-linecap="round"/>
  </g>

  <g class="trace-base" fill="none" stroke="#413822" stroke-width="18" stroke-linecap="round" stroke-linejoin="round">
    <path data-segment-id="left-ear" d="M250 235 C214 194 164 193 137 232 C110 270 126 322 174 339 C209 351 236 332 247 302 C258 274 250 248 227 234"/>
    <path data-segment-id="right-ear" d="M550 235 C590 194 642 197 667 239 C690 278 671 324 628 339 C594 351 567 333 556 304 C545 278 551 252 574 237"/>
    <path data-segment-id="left-eye" d="M224 410 C252 374 310 371 345 407 C330 444 278 463 236 439 C220 430 215 419 224 410 C246 391 279 395 292 417 C301 433 290 452 270 456"/>
    <path data-segment-id="right-eye" d="M456 414 C485 376 542 373 578 408 C559 449 505 462 467 438 C451 428 448 418 456 414 C482 399 516 402 530 425 C541 443 530 458 510 462"/>
    <path data-segment-id="nose" d="M401 475 C366 477 344 499 347 525 C350 553 378 570 404 568 C433 566 458 548 458 520 C458 492 434 474 401 475 C383 483 375 501 380 519 C384 535 399 542 413 535"/>
    <path data-segment-id="mouth" d="M274 603 C315 641 354 651 402 650 C453 650 495 636 535 601 C509 672 449 700 399 700 C346 700 298 671 274 603 Z"/>
    <path data-segment-id="stitches" d="M205 537 C245 518 280 520 313 544 M224 513 L236 549 M255 505 L264 541 M286 512 L292 548"/>
    <path data-segment-id="toxic-drip" d="M416 700 C418 739 445 748 440 781 C436 810 412 820 399 797 C388 779 401 758 389 740 C379 724 362 720 353 706"/>
  </g>

  <g class="direction-arrows" fill="none" stroke="#413822" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)" opacity="0.78" pointer-events="none">
    <path d="M145 244 C132 271 141 301 166 315"/>
    <path d="M659 248 C672 275 660 303 637 315"/>
    <path d="M241 397 C267 381 298 385 317 404"/>
    <path d="M476 399 C501 382 531 389 550 407"/>
    <path d="M367 496 C382 482 407 480 425 492"/>
    <path d="M307 622 C338 647 375 656 408 655"/>
    <path d="M219 529 C245 520 271 523 294 536"/>
    <path d="M406 724 C421 743 422 758 414 774"/>
  </g>

  <g class="start-markers" pointer-events="none">
    <circle data-start-for="left-ear" cx="250" cy="235" r="15" fill="#d8ff5b" stroke="#2f3811" stroke-width="5" filter="url(#glow)"/>
    <circle data-start-for="right-ear" cx="550" cy="235" r="11" fill="#b6c77e" opacity="0.65"/>
    <circle data-start-for="left-eye" cx="224" cy="410" r="11" fill="#b6c77e" opacity="0.65"/>
    <circle data-start-for="right-eye" cx="456" cy="414" r="11" fill="#b6c77e" opacity="0.65"/>
    <circle data-start-for="nose" cx="401" cy="475" r="11" fill="#b6c77e" opacity="0.65"/>
    <circle data-start-for="mouth" cx="274" cy="603" r="11" fill="#b6c77e" opacity="0.65"/>
    <circle data-start-for="stitches" cx="205" cy="537" r="11" fill="#b6c77e" opacity="0.65"/>
    <circle data-start-for="toxic-drip" cx="416" cy="700" r="11" fill="#b6c77e" opacity="0.65"/>
  </g>
</svg>
