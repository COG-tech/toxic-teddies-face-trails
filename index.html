<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#f4eddf" />
  <meta name="description" content="Toxic Teddies Arrow Escape — clear connected arrow pieces in the right order." />
  <title>Toxic Teddies: Arrow Escape</title>
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="stylesheet" href="./styles.css" />
  <link rel="stylesheet" href="./motion.css" />
</head>
<body>
  <div class="app-shell">
    <section id="homeView" class="home-view">
      <header class="home-header">
        <div>
          <p class="eyebrow">SERIES 1</p>
          <h1>TOXIC TEDDIES</h1>
          <p>Clear every connected arrow piece in the right order.</p>
        </div>
        <div id="collectionCounter" class="collection-counter">0 / 60</div>
      </header>
      <div id="teddyGrid" class="teddy-grid"></div>
    </section>

    <section id="gameView" class="game-view hidden">
      <header class="game-topbar">
        <button id="backButton" class="top-icon" type="button" aria-label="Back">←</button>
        <div class="game-title">
          <h2 id="levelTitle">Level 1</h2>
          <p id="characterName">Toxic Toby</p>
        </div>
        <div class="top-actions">
          <button id="hintButton" class="top-icon" type="button" aria-label="Hint">◌</button>
          <button id="resetButton" class="top-icon" type="button" aria-label="Reset">⬡</button>
        </div>
      </header>

      <div class="status-row">
        <div id="lives" class="lives" aria-label="Three toxic drops remaining"></div>
        <div class="progress">
          <span id="clearProgress">0 / 0</span>
          <strong id="percentProgress">0%</strong>
        </div>
      </div>

      <p id="statusText" class="status-text">Choose a piece with an open lane</p>

      <main class="board-shell">
        <div id="boardBackdrop" class="board-backdrop"></div>
        <svg id="board" class="board" role="img" aria-label="Connected arrow puzzle shaped like a Toxic Teddy">
          <g id="pieceLayer"></g>
        </svg>
        <svg id="previewLayer" class="preview-layer" aria-hidden="true"></svg>
      </main>

      <footer class="game-footer">
        <div id="levelButtons" class="level-buttons"></div>
      </footer>
    </section>
  </div>

  <div id="completionModal" class="modal-backdrop hidden">
    <section class="modal-card">
      <p class="eyebrow">FACE CLEARED</p>
      <h3 id="completionTitle">Toxic Toby · Level 1</h3>
      <p id="completionCopy"></p>
      <div class="modal-actions">
        <button id="replayButton" class="secondary-button" type="button">Replay</button>
        <button id="nextButton" class="primary-button" type="button">Next level</button>
      </div>
    </section>
  </div>

  <div id="gameOverModal" class="modal-backdrop hidden">
    <section class="modal-card">
      <p class="eyebrow">NO TOXIC DROPS LEFT</p>
      <h3>Study the lanes and try again.</h3>
      <button id="tryAgainButton" class="primary-button full" type="button">Try again</button>
    </section>
  </div>

  <script type="module" src="./app.js"></script>
</body>
</html>
