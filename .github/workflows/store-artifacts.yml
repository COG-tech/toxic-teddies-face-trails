name: Store release artifacts

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - app-version.json
      - package.json
      - capacitor.config.ts
      - vite.config.js
      - privacy.html
      - support.html
      - store/**
      - ios/**
      - android/**
      - src/**
      - scripts/**
      - assets/**
      - levels/**
      - '*.js'
      - .github/workflows/store-artifacts.yml

permissions:
  contents: read

concurrency:
  group: store-artifacts-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate-store:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Prepare versioned store build
        run: npm run prepare:build

      - name: Run complete store validation
        run: npm run check

      - name: Build verified offline web bundle
        run: npm run build

      - name: Upload store evidence
        uses: actions/upload-artifact@v5
        with:
          name: toxic-teddies-store-evidence-${{ github.sha }}
          path: |
            app-version.json
            store/metadata
            store/declarations
            store/reports/store-readiness.json
            src/generated/build-info.json
            src/generated/content-integrity.json
          if-no-files-found: error

  android-aab:
    needs: validate-store
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Prepare and build bundled application
        run: |
          npm run prepare:build
          npm run build
          npx cap sync android
          node scripts/verify-offline-bundle.mjs --native

      - name: Configure Android upload key when secrets are available
        shell: bash
        env:
          KEYSTORE_BASE64: ${{ secrets.TOXIC_ANDROID_KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.TOXIC_ANDROID_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.TOXIC_ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.TOXIC_ANDROID_KEY_PASSWORD }}
        run: |
          if [[ -n "$KEYSTORE_BASE64" && -n "$STORE_PASSWORD" && -n "$KEY_ALIAS" && -n "$KEY_PASSWORD" ]]; then
            KEYSTORE_PATH="$RUNNER_TEMP/toxic-teddies-upload.jks"
            printf '%s' "$KEYSTORE_BASE64" | base64 --decode > "$KEYSTORE_PATH"
            echo "TOXIC_ANDROID_KEYSTORE_PATH=$KEYSTORE_PATH" >> "$GITHUB_ENV"
            echo "TOXIC_ANDROID_STORE_PASSWORD=$STORE_PASSWORD" >> "$GITHUB_ENV"
            echo "TOXIC_ANDROID_KEY_ALIAS=$KEY_ALIAS" >> "$GITHUB_ENV"
            echo "TOXIC_ANDROID_KEY_PASSWORD=$KEY_PASSWORD" >> "$GITHUB_ENV"
            echo "TOXIC_ANDROID_ARTIFACT_SIGNED=true" >> "$GITHUB_ENV"
          else
            echo "TOXIC_ANDROID_ARTIFACT_SIGNED=false" >> "$GITHUB_ENV"
            echo "No upload-key secrets supplied; producing an unsigned validation AAB."
          fi

      - name: Build release Android App Bundle
        working-directory: android
        run: ./gradlew bundleRelease lintRelease --no-daemon

      - name: Record Android artifact status
        shell: bash
        run: |
          mkdir -p store-artifacts/android
          cp android/app/build/outputs/bundle/release/app-release.aab store-artifacts/android/toxic-teddies-0.5.0-build-3.aab
          printf '{"signed":%s,"applicationId":"com.cogtech.toxicteddies","versionName":"0.5.0","versionCode":3,"targetSdk":36}\n' "$TOXIC_ANDROID_ARTIFACT_SIGNED" > store-artifacts/android/artifact-status.json

      - name: Upload Android AAB
        uses: actions/upload-artifact@v5
        with:
          name: toxic-teddies-android-aab-${{ github.sha }}
          path: store-artifacts/android
          if-no-files-found: error

  ios-archive:
    needs: validate-store
    runs-on: macos-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Confirm App Store Xcode requirement
        shell: bash
        run: |
          xcodebuild -version
          major=$(xcodebuild -version | awk '/Xcode/{split($2,a,"."); print a[1]}')
          if [[ "$major" -lt 26 ]]; then
            echo "App Store builds require Xcode 26 or later. Runner has Xcode $major."
            exit 1
          fi

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Prepare and sync bundled application
        run: |
          npm run prepare:build
          npm run build
          npx cap sync ios
          node scripts/verify-offline-bundle.mjs --native

      - name: Create unsigned release archive
        shell: bash
        run: |
          set -o pipefail
          mkdir -p store-artifacts/ios
          xcodebuild \
            -project ios/App/App.xcodeproj \
            -scheme App \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$PWD/store-artifacts/ios/ToxicTeddies.xcarchive" \
            CODE_SIGNING_ALLOWED=NO \
            archive | tee store-artifacts/ios/xcodebuild.log
          test -f store-artifacts/ios/ToxicTeddies.xcarchive/Products/Applications/App.app/PrivacyInfo.xcprivacy
          /usr/libexec/PlistBuddy -c 'Print :CFBundleIdentifier' store-artifacts/ios/ToxicTeddies.xcarchive/Products/Applications/App.app/Info.plist
          ditto -c -k --sequesterRsrc --keepParent store-artifacts/ios/ToxicTeddies.xcarchive store-artifacts/ios/toxic-teddies-0.5.0-build-3-xcarchive.zip
          rm -rf store-artifacts/ios/ToxicTeddies.xcarchive
          printf '{"signed":false,"bundleId":"com.cogtech.toxicteddies","marketingVersion":"0.5.0","buildNumber":3,"uploadReady":false}\n' > store-artifacts/ios/artifact-status.json

      - name: Upload iOS archive
        uses: actions/upload-artifact@v5
        with:
          name: toxic-teddies-ios-archive-${{ github.sha }}
          path: store-artifacts/ios
          if-no-files-found: error
