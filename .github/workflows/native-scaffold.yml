name: Native scaffold and validation

on:
  workflow_dispatch:
  push:
    branches:
      - mobile/phases-1-10
      - mobile/phase-11-native-quality
    paths:
      - app-version.json
      - package.json
      - capacitor.config.ts
      - vite.config.js
      - index.html
      - src/**
      - scripts/**
      - assets/**
      - levels/**
      - compiled-app.js
      - hard-mode-v3.js
      - compiled-level-source.js
      - interaction-fix.js
      - mobile-enhancements.js
      - .github/workflows/native-scaffold.yml
  pull_request:
    branches:
      - main
    paths:
      - app-version.json
      - package.json
      - capacitor.config.ts
      - vite.config.js
      - index.html
      - src/**
      - scripts/**
      - assets/**
      - levels/**
      - compiled-app.js
      - hard-mode-v3.js
      - compiled-level-source.js
      - interaction-fix.js
      - mobile-enhancements.js
      - .github/workflows/native-scaffold.yml

permissions:
  contents: write

concurrency:
  group: native-scaffold-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  generate-and-validate:
    if: github.actor != 'github-actions[bot]'
    runs-on: macos-latest

    steps:
      - name: Check out source branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0

      - name: Set up Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Prepare centralized version and integrity data
        run: npm run prepare:build

      - name: Validate versions, runtime, saves and levels
        run: npm run check

      - name: Build verified offline application
        run: npm run build

      - name: Add iOS platform when missing
        id: add_ios
        shell: bash
        run: |
          mkdir -p native-logs
          status=0
          if [ ! -d ios ]; then
            npx cap add ios > native-logs/ios-add.log 2>&1 || status=$?
          else
            echo "iOS project already exists." > native-logs/ios-add.log
          fi
          cat native-logs/ios-add.log
          echo "status=$status" >> "$GITHUB_OUTPUT"

      - name: Add Android platform when missing
        id: add_android
        shell: bash
        run: |
          mkdir -p native-logs
          status=0
          if [ ! -d android ]; then
            npx cap add android > native-logs/android-add.log 2>&1 || status=$?
          else
            echo "Android project already exists." > native-logs/android-add.log
          fi
          cat native-logs/android-add.log
          echo "status=$status" >> "$GITHUB_OUTPUT"

      - name: Upload native generation diagnostics
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: native-generation-logs
          path: native-logs
          if-no-files-found: ignore

      - name: Fail when native platform generation failed
        if: steps.add_ios.outputs.status != '0' || steps.add_android.outputs.status != '0'
        run: |
          echo "iOS add status: ${{ steps.add_ios.outputs.status }}"
          echo "Android add status: ${{ steps.add_android.outputs.status }}"
          exit 1

      - name: Sync bundled app to native projects
        run: npx cap sync

      - name: Verify iOS and Android contain the exact offline bundle
        run: node scripts/verify-offline-bundle.mjs --native

      - name: Display Capacitor environment
        run: npx cap doctor

      - name: Build Android debug application
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Build iOS simulator application
        shell: bash
        run: |
          mkdir -p native-logs
          set -o pipefail
          xcodebuild \
            -project ios/App/App.xcodeproj \
            -scheme App \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            -derivedDataPath build/ios-derived \
            CODE_SIGNING_ALLOWED=NO \
            build 2>&1 | tee native-logs/ios-build.log

      - name: Upload iOS build diagnostics
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: ios-build-log
          path: native-logs/ios-build.log
          if-no-files-found: ignore

      - name: Commit synchronized native projects and generated reports
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json ios android src/generated src/content/level-manifest.json levels/tt01/level-*.json levels/tt01/compiled-manifest.json compiler/reports
          if git diff --cached --quiet; then
            echo "Native projects and generated files are already current."
          else
            git commit -m "Synchronize versioned native offline build"
            git push origin HEAD:${{ github.head_ref || github.ref_name }}
          fi
