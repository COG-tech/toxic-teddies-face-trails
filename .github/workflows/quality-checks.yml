name: Quality checks

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  check-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Prepare centralized version and content integrity
        run: npm run prepare:build

      - name: Validate runtime, saves, versions and levels
        run: npm run check

      - name: Build and verify offline bundle
        run: npm run build

      - name: Upload integrity and compiler reports
        uses: actions/upload-artifact@v5
        with:
          name: toxic-teddies-quality-reports
          path: |
            src/generated/build-info.json
            src/generated/content-integrity.json
            compiler/reports
          if-no-files-found: error
