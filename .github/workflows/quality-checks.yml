name: Quality checks

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  check-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Validate active runtime
        run: npm run check

      - name: Build browser prototype
        run: npm run build
