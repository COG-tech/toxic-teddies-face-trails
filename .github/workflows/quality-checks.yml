name: Quality checks

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  check-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Confirm dense pack source
        run: node -e "const fs=require('fs');const value=fs.readFileSync('levels/tt01/dense-levels-v6.txt','utf8').trim();if(!value.startsWith('H4sI'))throw new Error('Dense pack is not gzip base64');console.log('dense-pack-base64-bytes='+value.length)"

      - name: Decode and parse dense pack
        run: node --input-type=module -e "import{readFile}from'node:fs/promises';const value=(await readFile('levels/tt01/dense-levels-v6.txt','utf8')).trim();const bytes=Uint8Array.from(Buffer.from(value,'base64'));const stream=new Blob([bytes]).stream().pipeThrough(new DecompressionStream('gzip'));const text=await new Response(stream).text();const pack=JSON.parse(text);console.log('dense-pack-json-bytes='+text.length);console.log('dense-pack-keys='+Object.keys(pack).join(','))"

      - name: Extract precompiled Toxic Toby levels
        run: node scripts/extract-dense-levels.mjs

      - name: Check runtime JavaScript syntax
        run: |
          node --check dense-loader.js
          node --check compiled-app.js
          node --check hard-mode-v3.js
          node --check compiled-level-source.js
          node --check interaction-fix.js
          node --check mobile-enhancements.js
          node --check sw.js
          node --check src/app/bootstrap.js
          node --check src/app/native-bridge.js
          node --check src/app/mobile-shell.js
          node --check src/content/content-registry.js
          node --check src/game/input-controller.js
          node --check src/storage/save-store.js
          node --check src/accessibility/accessibility.js

      - name: Validate production level geometry and solver
        run: node scripts/validate-compiled-levels.mjs

      - name: Build bundled application
        run: npm run build
