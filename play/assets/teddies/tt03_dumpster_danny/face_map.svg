  </g>

  <g class="direction-arrows" fill="none" stroke="#413822" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)" opacity="0.8" pointer-events="none">
    <path d="M144 246 C131 273 141 303 166 316"/>
    <path d="M658 250 C671 276 661 304 638 316"/>
    <path d="M238 404 C260 384 291 385 312 401"/>
    <path d="M479 403 L516 387 L547 403"/>
    <path d="M363 506 L401 484 L435 505"/>
