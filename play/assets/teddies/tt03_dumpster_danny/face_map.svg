    <circle data-start-for="right-ear" cx="550" cy="236" r="11" fill="#b6c77e" opacity="0.65"/>
    <circle data-start-for="left-eye" cx="223" cy="420" r="11" fill="#b6c77e" opacity="0.65"/>
    <circle data-start-for="right-eye" cx="462" cy="405" r="11" fill="#b6c77e" opacity="0.65"/>
    <circle data-start-for="nose" cx="400" cy="475" r="11" fill="#b6c77e" opacity="0.65"/>
