    <circle data-start-for="forehead-crack" cx="401" cy="205" r="11" fill="#b6c77e" opacity="0.65"/>
    <circle data-start-for="chin-leak" cx="417" cy="699" r="11" fill="#b6c77e" opacity="0.65"/>
  </g>
</svg>
